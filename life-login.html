<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인생 로그인 — 아홉 원소의 100년</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FBF3EE; --card: #FFFDF9; --card-line: #F0E4DC;
    --text: #4A3F55; --text-soft: #93869F; --gold: #E8B84B;
    --radius: 20px; --shadow: 0 6px 20px rgba(150,120,130,0.12);
  }
  *{ box-sizing: border-box; }
  @media (prefers-reduced-motion: reduce){ *{ animation: none !important; transition: none !important; } }
  @media (max-width: 420px){
    .activity-grid{ grid-template-columns: 1fr; }
    .compound-grid{ grid-template-columns: 1fr; }
    .el-pick-grid{ grid-template-columns: repeat(2,1fr); }
    .puff-title{ font-size: 36px; }
  }
  body{
    margin:0; background: radial-gradient(circle at 15% 0%, #FFF7F0 0%, var(--bg) 45%, #F7EEF5 100%);
    color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh;
  }
  h1,h2,h3,.display{ font-family: 'Gaegu', sans-serif; }
  #stage{ max-width: 640px; margin: 0 auto; min-height: 100vh; padding: 28px 18px 60px; display:flex; flex-direction:column; }

  .scene{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; animation: fadeUp 0.5s ease; gap:6px; }
  @keyframes fadeUp{ from{ opacity:0; transform: translateY(14px); } to{ opacity:1; transform: translateY(0); } }

  .primary{ background: linear-gradient(135deg, #F08FAA, #B69AE0); border:none; color:#fff; font-weight:700;
    padding: 13px 30px; border-radius: 999px; font-size: 15.5px; cursor:pointer; font-family:'Noto Sans KR'; margin-top: 18px; }
  .primary:hover{ filter: brightness(1.05); }
  .primary:disabled{ background:#E6DFD8; color:#A79C93; cursor:not-allowed; }
  .ghost-btn{ background:none; border:1px solid var(--card-line); color:var(--text-soft); border-radius:999px; padding:8px 16px; font-size:13px; cursor:pointer; font-family:'Noto Sans KR'; }

  /* ---- crystal ---- */
  .crystal{ border-radius:50%; box-shadow: 0 6px 18px rgba(180,140,160,0.32); }
  .crystal.pulse{ animation: pulse 0.8s ease; }
  @keyframes pulse{ 0%{ transform:scale(1); } 45%{ transform:scale(1.16); box-shadow:0 0 0 6px #fff, 0 0 26px 6px var(--gold); } 100%{ transform:scale(1); } }

  /* ---- Title ---- */
  .puff-title{ font-size: 44px; margin: 0; letter-spacing: 1px; }
  .puff-title span{ display:inline-block; opacity:0; filter: blur(14px); transform: scale(1.7); animation: puffIn 0.7s ease forwards; }
  @keyframes puffIn{ to{ opacity:1; filter: blur(0); transform: scale(1); } }
  .title-sub{ color: var(--text-soft); font-size: 14.5px; margin-top: 4px; opacity:0; animation: fadeUp 0.6s ease 1.1s forwards; }
  .title-note{ color: var(--text-soft); font-size: 14.5px; border:1px dashed var(--card-line); border-radius:12px; padding:10px 14px; margin-top: 14px; max-width: 380px; line-height:1.5; opacity:0; animation: fadeUp 0.6s ease 1.3s forwards; }
  .title-crystal{ width:110px; height:110px; margin-bottom:14px; opacity:0; animation: fadeUp 0.7s ease 0.2s forwards; }
  #titleBtn{ opacity:0; animation: fadeUp 0.6s ease 1.5s forwards; }

  /* ---- Loading ---- */
  .load-spinner{ width: 60px; height:60px; border-radius:50%; margin-bottom: 18px;
    background: conic-gradient(#7FAFE0,#F4B571,#7FC9A0,#B69AE0,#F08FAA,#E8846B,#9FAF5C,#D88CC9,#6E6BAE,#7FAFE0);
    animation: spin 1.3s linear infinite; }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .load-text{ color: var(--text-soft); font-size: 14px; }
  .load-bar{ width: 200px; height: 6px; background:#F1E9E4; border-radius:999px; margin-top:14px; overflow:hidden; }
  .load-bar-fill{ height:100%; background: var(--gold); width:0%; animation: loadFill 1.2s ease forwards; }
  @keyframes loadFill{ to{ width:100%; } }

  /* ---- Explain ---- */
  .explain-card{ display:flex; align-items:center; gap:14px; text-align:left; background: var(--card);
    border:1px solid var(--card-line); border-radius:16px; padding:14px 16px; width:100%; max-width:420px;
    box-shadow: var(--shadow); opacity:0; animation: fadeUp 0.5s ease forwards; margin-bottom:10px; }
  .explain-card .num{ font-family:'Gaegu',sans-serif; font-size:20px; color:#8567B0; flex:none; width:52px; text-align:center; }
  .explain-card .txt strong{ display:block; font-size:14.5px; margin-bottom:2px; }
  .explain-card .txt span{ font-size:12.5px; color: var(--text-soft); }

  /* ---- Birth ---- */
  .birth-thud{ font-family:'Gaegu',sans-serif; font-size: 28px; }
  .birth-desc{ font-size:14px; line-height:1.7; color: var(--text-soft); max-width: 420px; margin-top:8px; }
  .el-pick-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap:8px; max-width:380px; margin-top:16px; }
  .el-chip{ background: var(--card); border:2px solid var(--card-line); border-radius:12px; padding:10px 4px; font-size:12px;
    cursor:pointer; transition: all .15s ease; }
  .el-chip .ic{ font-size:19px; display:block; margin-bottom:2px; }
  .el-chip:hover{ transform: translateY(-2px); }
  .el-chip.selected{ border-color: var(--gold); background:#FFF6E0; box-shadow: 0 0 0 2px rgba(232,184,75,0.28); font-weight:700; }
  .el-chip.disabled{ opacity:0.4; cursor:not-allowed; }
  .birth-counter{ font-size:12.5px; color: var(--text-soft); margin-top:10px; }

  /* ---- Play screen ---- */
  .play-scene{ align-items:stretch; text-align:left; justify-content:flex-start; gap:14px; }
  .play-head{ display:flex; align-items:center; gap:12px; }
  .play-head .crystal{ width:46px; height:46px; flex:none; }
  .play-head-info{ flex:1; }
  .play-head-info .badge{ font-family:'Gaegu',sans-serif; font-weight:700; font-size:15px; color:#8567B0; }
  .play-head-info .age{ font-size:12.5px; color:var(--text-soft); }
  .lean-chip{ font-size:11px; color:#8567B0; background:#F5EEFB; padding:3px 9px; border-radius:999px; display:inline-block; margin-top:4px; }
  .journal-btn{ background:none; border:1px solid var(--card-line); border-radius:999px; padding:7px 12px; font-size:12px; cursor:pointer; color: var(--text-soft); }

  .str-warning{ font-size:12.5px; color:#9C4A38; background:#FDE8E3; border:1px dashed #C0644F; border-radius:12px; padding:10px 12px; text-align:center; font-weight:700; margin-bottom:10px; }
  .act-card.locked{ opacity:0.45; cursor:not-allowed; }
  .act-card.locked:hover{ transform:none; box-shadow:none; }
  .archetype-tag{ font-size:12.5px; color:#8567B0; background:#F5EEFB; border-radius:12px; padding:8px 14px; margin-top:6px; }

  .stat-strip{ display:flex; flex-wrap:wrap; gap:6px; }
  .stat-chip{ font-size:11px; background:#F6F0FB; padding:5px 9px; border-radius:999px; }

  .story-line{ font-family:'Gaegu',sans-serif; font-size:17.5px; text-align:center; margin: 2px 0; color: var(--text); }

  .synth-hint{ font-size:12.5px; color:#8A6A1F; background:#FFF6E0; border:1px dashed var(--gold); border-radius:12px; padding:10px 12px; text-align:center; }
  .quick-synth-row{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:8px; }
  .quick-synth-chip{ background: var(--gold); color:#fff; border:none; border-radius:999px; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Noto Sans KR'; }
  .quick-synth-chip:hover{ filter: brightness(1.06); }
  .quick-synth-chip:focus-visible{ outline: 3px solid #8A6A1F; outline-offset:2px; }
  .box h3 .box-sub{ font-family:'Noto Sans KR'; font-size:11px; font-weight:400; color: var(--text-soft); margin-left:auto; }

  .box{ background: var(--card); border:1px solid var(--card-line); border-radius: var(--radius); padding:18px; box-shadow: var(--shadow); }
  .box h3{ margin:0 0 12px; font-size:17px; display:flex; align-items:center; gap:6px; }
  .box.main{ border-color: var(--gold); box-shadow: 0 0 0 2px rgba(232,184,75,0.18), var(--shadow); }
  .box.event-box{ border-color:#C7ABE0; box-shadow: 0 0 0 2px rgba(182,154,224,0.2), var(--shadow); }
  .box.crisis-box{ border-color:#E0A08A; box-shadow: 0 0 0 2px rgba(224,160,138,0.22), var(--shadow); }
  .crisis-sub{ font-size:12.5px; color:#B0503A; font-weight:700; margin-top:-4px; }

  .activity-grid{ display:grid; grid-template-columns: repeat(2,1fr); gap:10px; }
  .act-card{ text-align:left; border:1px solid var(--card-line); background:#FFFEFC; border-radius:14px; padding:12px 14px;
    cursor:pointer; font-family:'Noto Sans KR'; transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .act-card:hover{ transform: translateY(-2px); box-shadow: 0 6px 14px rgba(150,120,130,0.15); }
  .act-card:focus-visible{ outline: 3px solid var(--gold); outline-offset:2px; }
  .act-card .icon{ font-size:20px; }
  .act-card .title{ font-weight:700; margin-top:3px; font-size:14px; }
  .act-card .sub{ font-size:11.5px; color: var(--text-soft); margin-top:2px; }

  .situation-prompt{ font-family:'Gaegu',sans-serif; font-size:16px; line-height:1.55; margin-bottom:12px; }
  .situation-choices{ display:flex; flex-direction:column; gap:8px; }
  .choice-card{ text-align:left; border:1px solid var(--card-line); background:#FFFEFC; border-radius:14px; padding:12px 14px;
    cursor:pointer; font-family:'Noto Sans KR'; transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .choice-card:hover{ transform: translateY(-2px); box-shadow: 0 6px 14px rgba(150,120,130,0.15); }
  .choice-card:focus-visible{ outline: 3px solid var(--gold); outline-offset:2px; }
  .choice-label{ font-weight:700; font-size:14px; }
  .choice-tag{ font-size:11.5px; color: var(--text-soft); margin-top:4px; }

  .compound-scroll{ max-height: 320px; overflow-y:auto; padding-right:4px; }
  .compound-grid{ display:grid; grid-template-columns: repeat(2,1fr); gap:9px; }
  .comp-card{ border-radius:14px; padding:11px; border:1px solid var(--card-line); background:#FFFEFC; display:flex; flex-direction:column; gap:5px; }
  .comp-card.ready{ border-color: var(--gold); box-shadow: 0 0 0 2px rgba(232,184,75,0.25); background:#FFFCF3; }
  .comp-card.done{ background:#FBF6EA; }
  .comp-head{ display:flex; align-items:center; gap:7px; }
  .comp-head .icon{ font-size:18px; }
  .comp-head .name{ font-weight:700; font-size:13px; }
  .comp-desc{ font-size:11px; color: var(--text-soft); line-height:1.4; min-height:28px; }
  .comp-req{ font-size:10.5px; color: var(--text-soft); }
  .comp-btn{ margin-top:2px; border:none; border-radius:999px; padding:6px 10px; font-size:12px; background: var(--gold); color:#fff; cursor:pointer; font-weight:700; }
  .comp-btn:disabled{ background:#E6DFD8; color:#A79C93; cursor:not-allowed; }
  .comp-done-tag{ font-size:10.5px; color:#B08A2B; font-weight:700; }

  /* ---- Result / mini gauges ---- */
  .result-icon{ font-size: 50px; }
  .result-text{ font-family:'Gaegu',sans-serif; font-size:18.5px; max-width:420px; line-height:1.5; }
  .result-stat{ width:100%; max-width:320px; margin-top:14px; text-align:left; }
  .result-stat .lbl{ font-size:12.5px; color:var(--text-soft); margin-bottom:4px; display:flex; justify-content:space-between; }
  .stat-track{ height: 11px; border-radius: 999px; background: #F1E9E4; overflow:hidden; }
  .stat-fill{ height:100%; border-radius:999px; transition: width 0.7s cubic-bezier(.2,.9,.3,1); }
  .result-event{ font-size:13px; color: var(--text-soft); max-width:380px; margin-top:10px; }
  .result-unlock{ margin-top:14px; background:#FFF6E0; border:1px solid var(--gold); border-radius:12px; padding:10px 14px; font-size:13px; color:#8A6A1F; max-width:380px; }

  /* ---- Chapter (career/retire/ending) ---- */
  .big-icon{ font-size:54px; }
  .epitaph{ font-family:'Gaegu',sans-serif; font-size:17.5px; color: var(--text); background:#FBF6EA; border-radius:14px; padding:16px; max-width:440px; margin: 10px 0 6px; }
  .epitaph.downfall-epitaph{ background:#F5E6E1; color:#6B4A3D; }
  .chapter-desc{ font-size:14px; line-height:1.65; color: var(--text-soft); max-width:440px; margin: 8px 0 6px; }
  .modal-stats{ display:flex; justify-content:center; gap:7px; flex-wrap:wrap; margin: 12px 0 4px; max-width: 460px; }

  /* ---- Journal overlay ---- */
  .overlay{ position:fixed; inset:0; background: rgba(74,63,85,0.45); display:none; align-items:center; justify-content:center; padding:20px; z-index:50; }
  .overlay.show{ display:flex; }
  .journal-modal{ background: var(--card); border-radius:24px; max-width:460px; width:100%; padding:22px 20px; box-shadow: 0 20px 50px rgba(80,60,70,0.3); max-height:80vh; display:flex; flex-direction:column; }
  .journal-modal h2{ margin:0 0 12px; font-size:20px; }
  .journal-list{ overflow-y:auto; display:flex; flex-direction:column-reverse; gap:8px; }
  .log-item{ font-size:13px; line-height:1.5; padding:8px 12px; border-radius:12px; background:#FBF6EF; }
  .log-item.event{ background:#F3EEFB; }
  .journal-close{ margin-top:14px; align-self:center; }
</style>
</head>
<body>
<div id="stage"></div>
<div class="overlay" id="journalOverlay">
  <div class="journal-modal">
    <h2>📖 인생 일지</h2>
    <div class="journal-list" id="journalList"></div>
    <button class="ghost-btn journal-close" id="journalCloseBtn">닫기</button>
  </div>
</div>

<script>
/* ================= Data ================= */
const ELEMENTS = {
  int:    { label:'지능',   icon:'📘', color:'#7FAFE0' },
  soc:    { label:'사회성', icon:'🎈', color:'#F4B571' },
  care:   { label:'돌봄',   icon:'🌱', color:'#7FC9A0' },
  char:   { label:'인성',   icon:'🕊️', color:'#B69AE0' },
  sens:   { label:'감수성', icon:'🎨', color:'#F08FAA' },
  str:    { label:'체력',   icon:'💪', color:'#E8846B' },
  wealth: { label:'재력',   icon:'💰', color:'#9FAF5C' },
  charm:  { label:'매력',   icon:'🌹', color:'#D88CC9' },
  faith:  { label:'신념',   icon:'🕯️', color:'#6E6BAE' }
};

const ACTIVITY_SETS = {
  youth: [
    { key:'int', title:'공부하기', icon:'📚', sub:'지능 +', flavors:[
      '두꺼운 책을 끝까지 읽어냈다.', '어려운 문제를 스스로 풀어냈다.', '새로운 단어를 백 개나 외웠다.' ]},
    { key:'soc', title:'어울리기', icon:'🎈', sub:'사회성 +', flavors:[
      '동네 친구들과 하루 종일 뛰어놀았다.', '처음 만난 아이에게 먼저 말을 걸었다.', '모두가 함께하는 놀이를 이끌었다.' ]},
    { key:'care', title:'돌봄 연습', icon:'🌱', sub:'돌봄 +', flavors:[
      '화분에 물을 주며 시들지 않게 돌봤다.', '어린 동물을 정성껏 보살폈다.', '아픈 이웃 어른을 도와드렸다.' ]},
    { key:'char', title:'수양하기', icon:'🧘', sub:'인성 +', flavors:[
      '약속을 끝까지 지켜냈다.', '잘못을 솔직하게 인정했다.', '조용히 앉아 마음을 다잡았다.' ]},
    { key:'sens', title:'예술 활동', icon:'🎨', sub:'감수성 +', flavors:[
      '노을을 보고 한참을 서 있었다.', '서툰 그림을 몇 시간이고 그렸다.', '슬픈 노래를 듣고 눈물을 흘렸다.' ]},
    { key:'str', title:'운동하기', icon:'⚽', sub:'체력 +', flavors:[
      '골목에서 해질 때까지 공을 찼다.', '달리기 시합에서 끝까지 포기하지 않았다.', '나무를 타다 무릎이 까져도 다시 올라갔다.' ]},
    { key:'wealth', title:'용돈 관리하기', icon:'🪙', sub:'재력 +', flavors:[
      '용돈을 아껴 저금통을 채웠다.', '작은 물건을 팔아 첫 돈을 벌어보았다.', '가계부 흉내를 내며 씀씀이를 따져봤다.' ]},
    { key:'charm', title:'꾸미기', icon:'✨', sub:'매력 +', flavors:[
      '거울 앞에서 스타일을 이것저것 시도해봤다.', '자신만의 분위기를 찾아갔다.', '사람들 앞에서 자신 있게 웃는 법을 배웠다.' ]},
    { key:'faith', title:'마음 다스리기', icon:'🕯️', sub:'신념 +', flavors:[
      '밤하늘을 보며 알 수 없는 것들을 생각했다.', '어른들이 믿는 것들에 대해 곰곰이 물었다.', '혼자만의 다짐의 시간을 가졌다.' ]}
  ],
  career: [
    { key:'int', title:'전문성 키우기', icon:'📘', sub:'지능 +', flavors:[
      '새로운 업무 기술을 익혔다.', '밤새워 자격증 공부를 했다.', '낯선 분야의 지식을 파고들었다.' ]},
    { key:'soc', title:'인맥 쌓기', icon:'🎈', sub:'사회성 +', flavors:[
      '동료들과 신뢰를 쌓았다.', '새로운 파트너와 협업을 시작했다.', '회식 자리에서 마음을 터놓았다.' ]},
    { key:'care', title:'가족 돌보기', icon:'🌱', sub:'돌봄 +', flavors:[
      '퇴근 후 아이의 숙제를 봐주었다.', '바쁜 와중에도 부모님께 안부를 전했다.', '후배의 고민을 들어주었다.' ]},
    { key:'char', title:'직업윤리 지키기', icon:'🧘', sub:'인성 +', flavors:[
      '손해를 감수하고도 원칙을 지켰다.', '유혹이 있었지만 정직을 택했다.', '묵묵히 맡은 일을 끝까지 해냈다.' ]},
    { key:'sens', title:'삶의 균형 찾기', icon:'🎨', sub:'감수성 +', flavors:[
      '퇴근길 노을에 잠시 마음을 놓았다.', '오랜만에 좋아하던 취미를 다시 시작했다.', '바쁜 하루 끝에 일기를 썼다.' ]},
    { key:'str', title:'몸 단련하기', icon:'🏋️', sub:'체력 +', flavors:[
      '새벽마다 운동을 거르지 않았다.', '체력이 바닥나도 끝까지 버텨냈다.', '주말마다 산을 오르며 체력을 다졌다.' ]},
    { key:'wealth', title:'자산 불리기', icon:'💰', sub:'재력 +', flavors:[
      '월급을 쪼개 조금씩 투자를 시작했다.', '무리한 지출을 참고 목돈을 모았다.', '새로운 수익의 기회를 놓치지 않았다.' ]},
    { key:'charm', title:'이미지 관리하기', icon:'💫', sub:'매력 +', flavors:[
      '첫인상을 좋게 남기려 신경 썼다.', '자기만의 스타일을 확고히 다졌다.', '어디서든 눈에 띄는 존재감을 갖추었다.' ]},
    { key:'faith', title:'신념 지키기', icon:'⛰️', sub:'신념 +', flavors:[
      '흔들리는 순간에도 자신의 신념을 붙들었다.', '바쁜 삶 속에서도 마음의 중심을 챙겼다.', '옳다고 믿는 것을 위해 손해를 감수했다.' ]}
  ],

function freshState(){
  stats = null; done = {}; doneTurn = {};
  COMPOUNDS.forEach(c => { done[c.id] = false; });
  turnsTaken = 0; logEntries = [];
  careerKey = null; legacyKey = null;
  lastResult = null; lastSynth = null; pendingMajor = null; lastDownfall = null;
  selectedStart = [];
  activeEventScenario = null;
  usedScenarioKeys = new Set();
  eventTurns = pickEventTurns();
}

function pickEventTurns(){
  // 게임 전체의 첫 턴(0번)은 규칙을 익히는 턴이라 이벤트에서 제외. 시기별로 2턴씩 이벤트.
  const set = new Set();
  let acc = 0;
  PHASES.forEach((p, idx) => {
    const minLocal = idx === 0 ? 1 : 0;
    const options = [];
    for (let i = minLocal; i < p.turns; i++) options.push(i);
    for (let i = options.length - 1; i > 0; i--) {
      const j = randInt(0, i);
      [options[i], options[j]] = [options[j], options[i]];
    }
    const count = Math.min(2, options.length);
    for (let i = 0; i < count; i++) set.add(acc + options[i]);
    acc += p.turns;
  });
  return set;
}

function pickScenario(phase){
  // 같은 시나리오가 같은 판에서 중복으로 나오지 않도록 관리
  const candidates = [];
  EVENT_SITUATIONS[phase].forEach((s, i) => candidates.push({ kind:'situation', regKey:`${phase}-s${i}`, data:s }));
  CRISIS_EVENTS[phase].forEach((s, i) => candidates.push({ kind:'crisis', regKey:`${phase}-c${i}`, data:s }));
  let pool = candidates.filter(c => !usedScenarioKeys.has(c.regKey));
  if (pool.length === 0) pool = candidates;
  const chosen = pick(pool);
  usedScenarioKeys.add(chosen.regKey);
  return { kind: chosen.kind, icon: chosen.data.icon, prompt: chosen.data.prompt, choices: chosen.data.choices };
}

function randInt(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function clampStat(v){ return Math.max(0, Math.min(MAX_STAT, v)); }
function addLog(text, type){ logEntries.push({ text, type }); }

function getProgress(){
  let acc = 0;
  for (const p of PHASES){
    if (turnsTaken < acc + p.turns) return { phase: p, turnsInto: turnsTaken - acc };
    acc += p.turns;
  }
  const last = PHASES[PHASES.length-1];
  return { phase: last, turnsInto: last.turns };
}
function currentAge(){
  if (turnsTaken >= TOTAL_TURNS) return 100;
  const p = getProgress();
  const span = p.phase.endAge - p.phase.startAge;
  return Math.min(p.phase.endAge, p.phase.startAge + Math.round(p.turnsInto / p.phase.turns * span));
}
function currentPhase(){ return getProgress().phase.key; }

function crystalGradient(){
  const total = Object.values(stats).reduce((a,b)=>a+b,0) || 1;
  let acc = 0; const stops = [];
  Object.keys(ELEMENTS).forEach(k => {
    const pct = stats[k]/total*100;
    stops.push(`${ELEMENTS[k].color} ${acc}% ${acc+pct}%`);
    acc += pct;
  });
  return `conic-gradient(${stops.join(',')})`;
}

function isReady(c, s){ return !done[c.id] && s[c.parents[0]] >= SYN_THRESHOLD && s[c.parents[1]] >= SYN_THRESHOLD; }
function isStrLocked(){ return stats.str <= STR_LOCK_THRESHOLD; }
function leaningInfo(){
  const scores = {};
  Object.keys(ARCHETYPES).forEach(k => { if (k !== 'blank') scores[k] = 0; });
  COMPOUNDS.forEach(c => { if (done[c.id]) scores[c.archetype]++; });
  const total = Object.values(scores).reduce((a,b) => a + b, 0);
  if (total === 0) return null;
  let best = null, bestScore = -1;
  Object.keys(scores).forEach(k => { if (scores[k] > bestScore) { bestScore = scores[k]; best = k; } });
  return { key: best, count: bestScore, total };
}

function computeArchetype(filterFn){
  const scores = {};
  Object.keys(ARCHETYPES).forEach(k => scores[k] = 0);
  COMPOUNDS.forEach(c => { if (done[c.id] && filterFn(c.id)) scores[c.archetype]++; });
  const totalSynth = Object.keys(scores).filter(k => k !== 'blank').reduce((a,k) => a + scores[k], 0);
  if (totalSynth === 0) return 'blank';
  let best = null, bestScore = -1;
  Object.keys(scores).forEach(k => {
    if (k === 'blank') return;
    if (scores[k] > bestScore) { bestScore = scores[k]; best = k; }
    else if (scores[k] === bestScore && best) { if (statSumForArchetype(k) > statSumForArchetype(best)) best = k; }
  });
  return best;
}
function statSumForArchetype(arch){
  const keys = new Set();
  COMPOUNDS.filter(c => c.archetype === arch).forEach(c => c.parents.forEach(p => keys.add(p)));
  return [...keys].reduce((sum,k) => sum + stats[k], 0);
}

  const isFirstOfPhase = prog.turnsInto === 0;
  const isEventTurn = eventTurns.has(turnsTaken);
  if (isEventTurn && !activeEventScenario) activeEventScenario = pickScenario(phase);
  if (!isEventTurn) activeEventScenario = null;

  const storyLine = isEventTurn ? '예상치 못한 상황이 벌어졌습니다.' : (isFirstOfPhase ? `${prog.phase.label}가 시작됩니다.` : '이 시간을 무엇으로 채울까요?');

  const dangerKeys = DOWNFALL_ORDER.filter(k => k !== 'str' && stats[k] > 0 && stats[k] <= DANGER_THRESHOLD);

  const statChips = Object.keys(ELEMENTS).map(k =>
    `<span class="stat-chip">${ELEMENTS[k].icon} ${stats[k]}</span>`).join('');

  const compCards = COMPOUNDS.map(c => {
    const [p1,p2] = c.parents;

      <div class="comp-card${done[c.id] ? ' done' : ready ? ' ready' : ''}">
        <div class="comp-head"><span class="icon">${c.icon}</span><span class="name">${c.name}</span></div>
        <div class="comp-desc">${c.desc}</div>
        <div class="comp-req">${ELEMENTS[p1].label} ${stats[p1]}/${SYN_THRESHOLD} · ${ELEMENTS[p2].label} ${stats[p2]}/${SYN_THRESHOLD}</div>
        ${done[c.id] ? `<span class="comp-done-tag">${ARCHETYPES[c.archetype].icon} ${ARCHETYPES[c.archetype].name} 성향 +1</span>` : `<button class="comp-btn" data-comp="${c.id}" ${ready ? '' : 'disabled'}>합성하기</button>`}
      </div>`;
  }).join('');

  let rightBoxHtml;
  if (isEventTurn) {
    const s = activeEventScenario;
    const isCrisis = s.kind === 'crisis';
    rightBoxHtml = `
      <div class="box ${isCrisis ? 'crisis-box' : 'event-box'}">
        <h3>${isCrisis ? '⚡ 예상치 못한 위기' : '🎭 예상치 못한 상황'}</h3>
        <p class="situation-prompt">${s.icon} ${s.prompt}</p>
        <div class="situation-choices">
          ${s.choices.map((ch,i) => `
            <button class="choice-card" data-choice="${i}">
              <div class="choice-label">${ch.label}</div>
              <div class="choice-tag">${ch.effects.map(e => `${ELEMENTS[e.key].icon} ${ELEMENTS[e.key].label} ${e.amt >= 0 ? '+' : ''}${e.amt}`).join(' · ')}</div>
            </button>`).join('')}
        </div>
      </div>`;
  } else {
    const strLocked = turnsTaken > 0 && isStrLocked();
    const actCards = ACTIVITY_SETS[phase].map((a,i) => {
      const locked = strLocked && a.key !== 'str';
      return `
      <button class="act-card${locked ? ' locked' : ''}" data-act="${i}" ${locked ? 'disabled' : ''}>
        <div class="icon">${a.icon}</div><div class="title">${a.title}</div><div class="sub">${locked ? '체력 부족' : `${a.sub} ${ELEMENTS[a.key].label} · ${ELEMENTS[RIVAL[a.key]].icon} ${ELEMENTS[RIVAL[a.key]].label} −`}</div>
      </button>`;
    }).join('');
    rightBoxHtml = `
      ${strLocked ? `<div class="str-warning">⚠️ 체력이 바닥났어요! 몸을 움직이지 않으면 아무것도 할 수 없어요.</div>` : ''}
      <div class="box">
        <h3>📅 재료 모으기 — 이번 시기의 활동</h3>
        <div class="activity-grid">${actCards}</div>
      </div>`;
  }

  return `
    <div class="scene play-scene">
      <div class="play-head">
        <div class="crystal" style="background:${crystalGradient()}"></div>
        <div class="play-head-info">
          <div class="badge">${prog.phase.label}</div>
          <div class="age">${currentAge()}세 · ${turnsTaken}/${TOTAL_TURNS}턴</div>
          <div class="lean-chip">${(() => { const lean = leaningInfo(); return lean ? `${ARCHETYPES[lean.key].icon} ${ARCHETYPES[lean.key].name} 쪽으로 (합성 ${lean.total}개)` : '아직 뚜렷한 성향 없음'; })()}</div>
        </div>
        <button class="journal-btn" id="journalBtn">📖 일지</button>
      </div>
      <div class="stat-strip">${statChips}</div>
      <div class="story-line">${storyLine}</div>
      ${dangerKeys.length ? `<div class="str-warning">⚠️ ${dangerKeys.map(k => ELEMENTS[k].label).join(', ')}이(가) 위태로워요. 완전히 바닥나면 돌이킬 수 없는 일이 벌어질 수 있어요.</div>` : ''}
      ${readyCompounds.length ? `
      <div class="synth-hint">
        ✨ 지금 바로 합성할 수 있어요!
        <div class="quick-synth-row">
          ${readyCompounds.map(c => `<button class="quick-synth-chip" data-comp="${c.id}">${c.icon} ${c.name} 합성</button>`).join('')}
        </div>
      </div>` : ''}

      ${rightBoxHtml}

      <div class="box">
        <h3>⚗️ 합성 실험실 <span class="box-sub">전체 조합 보기</span></h3>
        <div class="compound-scroll"><div class="compound-grid">${compCards}</div></div>
      </div>
    </div>`;
}

/* ---- Result (활동/상황 결과: 변화가 바로 보임) ---- */
function renderResult(){
  const r = lastResult;
  const barsHtml = r.effects.map(e => `
    <div class="result-stat">
      <div class="lbl"><span>${ELEMENTS[e.key].icon} ${e.label}</span><span>${e.oldVal} → ${e.newVal}</span></div>
      <div class="stat-track"><div class="stat-fill result-fill" style="width:${e.oldVal}%; background:${e.color};" data-target="${e.newVal}"></div></div>
    </div>`).join('');
  const unlockedHtml = r.unlocked.length ? `
    <div class="result-unlock">✨ 이제 합성할 수 있어요: ${r.unlocked.map(c => `${c.icon} ${c.name}`).join(', ')}</div>` : '';
  return `
    <div class="scene">
      <div class="crystal pulse" style="width:60px; height:60px; background:${crystalGradient()}"></div>
      <div class="result-icon">${r.icon}</div>
      <p class="result-text">${r.text}</p>
      ${barsHtml}
      ${unlockedHtml}
      <button class="primary" id="resultNextBtn">다음</button>
    </div>`;
}

/* ---- Synth result (합성: 가장 화려한 연출) ---- */
function renderSynthResult(){
  const s = lastSynth; const c = s.compound; const [p1,p2] = c.parents;
  const arch = ARCHETYPES[c.archetype];
  const lean = leaningInfo();
  return `
    <div class="scene">
      <div class="crystal pulse" style="width:70px; height:70px; background:${crystalGradient()}"></div>
      <div class="result-icon">${c.icon}</div>
      <h2>✨ ${c.name}, 합성 완료</h2>
      <p class="chapter-desc">${c.desc}</p>
      <div class="archetype-tag">${arch.icon} 이 자질은 <b>${arch.name}</b>의 길과 이어져 있어요</div>
      <div class="result-stat">
        <div class="lbl"><span>${ELEMENTS[p1].icon} ${ELEMENTS[p1].label}</span><span>${s.oldP1} → ${s.newP1}</span></div>
        <div class="stat-track"><div class="stat-fill result-fill" style="width:${s.oldP1}%; background:${ELEMENTS[p1].color};" data-target="${s.newP1}"></div></div>
      </div>
      <div class="result-stat">
        <div class="lbl"><span>${ELEMENTS[p2].icon} ${ELEMENTS[p2].label}</span><span>${s.oldP2} → ${s.newP2}</span></div>
        <div class="stat-track"><div class="stat-fill result-fill" style="width:${s.oldP2}%; background:${ELEMENTS[p2].color};" data-target="${s.newP2}"></div></div>
      </div>
      ${lean ? `<div class="lean-chip" style="margin-top:10px;">지금까지 총 ${lean.total}개 합성 · 가장 짙은 성향은 ${ARCHETYPES[lean.key].icon} ${ARCHETYPES[lean.key].name}</div>` : ''}
      <button class="primary" id="synthNextBtn">다음</button>
    </div>`;
}

/* ---- Career reveal (30세) ---- */
function renderCareer(){
  const arch = ARCHETYPES[careerKey];
  const job = JOB_TITLE[careerKey];
  const body = careerKey === 'blank'
    ? '아직 하나의 길을 정하지 못한 채 서른을 맞았습니다. 그래도 인생은 아직 한참 남았습니다.'
    : `그동안 합성한 자질을 따라, <b>${job}</b>의 길로 접어들었습니다.`;
  return `
    <div class="scene">
      <div class="big-icon">${arch.icon}</div>
      <h2>서른 살, 직업이 정해지다</h2>
      <p class="chapter-desc">${body}</p>
      <div class="epitaph">"${arch.desc}"</div>
      <button class="primary" id="careerNextBtn">30대를 시작하기</button>
    </div>`;
}

/* ---- Retirement (60세) ---- */
function renderRetire(){
  const job = JOB_TITLE[careerKey] || '무명';
  return `
    <div class="scene">
      <div class="big-icon">🌇</div>
      <h2>예순, 정년을 맞이하다</h2>
      <p class="chapter-desc"><b>${job}</b>(으)로 서른 해를 살아내고, 마침내 정년을 맞았습니다. 이제부터는 일이 아닌, 스스로가 고른 하루하루가 남았습니다.</p>
      <button class="primary" id="retireNextBtn">노후의 삶으로</button>
    </div>`;
}

/* ---- Ending (100세) ---- */
function renderEnding(){
  const legacy = ARCHETYPES[legacyKey];
  const job = JOB_TITLE[careerKey] || '무명';
  const sameLegacy = legacyKey === careerKey;
  const headline = sameLegacy
    ? `평생 한결같이 '${legacy.name}'의 삶을 살다 갔습니다.`
    : `'${job}'(으)로 삶을 시작했지만, 사람들은 결국 당신을 '${legacy.name}'(으)로 기억합니다.`;
  const statsHtml = Object.keys(ELEMENTS).map(k =>
    `<span class="stat-chip">${ELEMENTS[k].icon} ${ELEMENTS[k].label} ${stats[k]}</span>`).join('');
  return `
    <div class="scene">
      <div class="big-icon">${legacy.icon}</div>
      <h2>100세, 삶이 저물다</h2>
      <div class="epitaph">${headline}</div>
      <p class="chapter-desc">${legacy.desc}</p>
      <div class="modal-stats">${statsHtml}</div>
      <button class="primary" id="endingRestartBtn">🔄 새로운 삶을 시작하기</button>
    </div>`;
}

/* ---- Downfall (파국 엔딩: 100세를 채우지 못하고 끝난다) ---- */
function renderDownfall(){
  const d = lastDownfall;
  const statsHtml = Object.keys(ELEMENTS).map(k =>
    `<span class="stat-chip">${ELEMENTS[k].icon} ${ELEMENTS[k].label} ${stats[k]}</span>`).join('');
  return `
    <div class="scene">
      <div class="big-icon">${d.icon}</div>
      <h2>${d.title}</h2>
      <div class="epitaph downfall-epitaph">${d.desc}</div>
      <p class="chapter-desc">${currentAge()}세, 이야기는 여기서 끝났습니다. 채우지 못한 채 남은 삶이 있었습니다.</p>
      <div class="modal-stats">${statsHtml}</div>
      <button class="primary" id="downfallRestartBtn">🔄 새로운 삶을 시작하기</button>
    </div>`;
}

/* ================= Actions ================= */
function toggleStart(key){
  const i = selectedStart.indexOf(key);
  if (i > -1) selectedStart.splice(i,1);
  else if (selectedStart.length < START_PICK_COUNT) selectedStart.push(key);
  updateBirthUI();
}

function confirmBirth(){
  if (selectedStart.length !== START_PICK_COUNT) return;
  stats = {};
  Object.keys(ELEMENTS).forEach(k => {
    stats[k] = selectedStart.includes(k) ? randInt(24,29) : randInt(15,20);
  });
  addLog(`🌱 이야기가 시작되었다. 타고난 재능은 ${selectedStart.map(k => ELEMENTS[k].label).join(', ')}이었다.`);
  goScreen('choose');
}

function checkDownfall(){
  for (const key of DOWNFALL_ORDER) {
    if (stats[key] <= 0) return DOWNFALLS.find(d => d.key === key);
  }
  return null;
}

function afterTurnAdvance(unlockedBefore){
  const unlocked = COMPOUNDS.filter(c => isReady(c, stats) && !isReady(c, unlockedBefore));
  const downfall = checkDownfall();
  if (downfall) {
    lastDownfall = downfall;
    pendingMajor = 'downfall';
  } else {
    let major = null;
    const idx = CUM_ENDS.indexOf(turnsTaken);
    if (idx !== -1) major = idx === 0 ? 'career' : idx === 1 ? 'retire' : 'ending';
    pendingMajor = major;
  }
  return unlocked;
}

function doActivity(a){
  if (turnsTaken >= TOTAL_TURNS) return;
  const before = { ...stats };
  const oldVal = stats[a.key];
  const gain = randInt(6, 12);
  stats[a.key] = clampStat(stats[a.key] + gain);
  const flavor = pick(a.flavors);
  addLog(`${a.icon} ${flavor} (${ELEMENTS[a.key].label} +${gain})`);

  const rivalKey = RIVAL[a.key];
  const rivalOld = stats[rivalKey];
  const rivalDrop = randInt(2, 4);
  stats[rivalKey] = clampStat(stats[rivalKey] - rivalDrop);
  addLog(`⚖️ ${RIVAL_FLAVOR[a.key]} (${ELEMENTS[rivalKey].label} ${stats[rivalKey]-rivalOld})`, 'event');

  turnsTaken++;
  const unlocked = afterTurnAdvance(before);
  lastResult = {
    icon: a.icon, text: flavor,
    effects: [
      { key: a.key, oldVal, newVal: stats[a.key], label: ELEMENTS[a.key].label, color: ELEMENTS[a.key].color },
      { key: rivalKey, oldVal: rivalOld, newVal: stats[rivalKey], label: ELEMENTS[rivalKey].label, color: ELEMENTS[rivalKey].color }
    ],
    unlocked
  };
  goScreen('result');
}

function doEventChoice(choice){
  if (turnsTaken >= TOTAL_TURNS) return;
  const before = { ...stats };
  const effects = choice.effects.map(e => {
    const oldVal = stats[e.key];
    stats[e.key] = clampStat(stats[e.key] + e.amt);
    return { key: e.key, oldVal, newVal: stats[e.key], label: ELEMENTS[e.key].label, color: ELEMENTS[e.key].color, amt: e.amt };
  });
  const summary = effects.map(e => `${ELEMENTS[e.key].label} ${e.amt >= 0 ? '+' : ''}${e.amt}`).join(', ');
  addLog(`${activeEventScenario.icon} ${choice.resultText} (${summary})`, 'event');
  const icon = activeEventScenario.icon;
  activeEventScenario = null;
  turnsTaken++;
  const unlocked = afterTurnAdvance(before);
  lastResult = { icon, text: choice.resultText, effects, unlocked };
  goScreen('result');
}

function synthesize(c){
  const [p1, p2] = c.parents;
  if (done[c.id] || stats[p1] < SYN_THRESHOLD || stats[p2] < SYN_THRESHOLD) return;
  const oldP1 = stats[p1], oldP2 = stats[p2];
  done[c.id] = true;
  doneTurn[c.id] = turnsTaken;
  stats[p1] = clampStat(stats[p1] + SYN_BONUS);
  stats[p2] = clampStat(stats[p2] + SYN_BONUS);
  addLog(`✨ [합성] ${c.icon} ${c.name}이(가) 완성되었다 — ${c.desc}`, 'event');
  lastSynth = { compound: c, oldP1, newP1: stats[p1], oldP2, newP2: stats[p2] };
  goScreen('synthResult');
}

function openJournal(){
  const list = document.getElementById('journalList');
  list.innerHTML = '';
  logEntries.slice(-60).forEach(entry => {
    const div = document.createElement('div');
    div.className = 'log-item' + (entry.type ? ' ' + entry.type : '');
    div.textContent = entry.text;
    list.appendChild(div);
  });
  document.getElementById('journalOverlay').classList.add('show');
}

/* ================= Event wiring ================= */
function attachHandlers(){
  const $ = (id) => document.getElementById(id);

  if (screen === 'title' && $('titleBtn')) $('titleBtn').addEventListener('click', () => goScreen('loading'));
  if (screen === 'explain' && $('explainNextBtn')) $('explainNextBtn').addEventListener('click', () => goScreen('birth'));

  if (screen === 'birth') {
    document.querySelectorAll('.el-chip').forEach(chip => chip.addEventListener('click', () => toggleStart(chip.dataset.key)));
    if ($('birthBtn')) $('birthBtn').addEventListener('click', confirmBirth);
  }

  if (screen === 'choose') {
    document.querySelectorAll('.act-card').forEach(btn => {
      btn.addEventListener('click', () => doActivity(ACTIVITY_SETS[currentPhase()][+btn.dataset.act]));
    });
    document.querySelectorAll('.choice-card').forEach(btn => {
      btn.addEventListener('click', () => doEventChoice(activeEventScenario.choices[+btn.dataset.choice]));
    });
    document.querySelectorAll('.comp-btn').forEach(btn => {
      btn.addEventListener('click', () => synthesize(COMPOUNDS.find(c => c.id === btn.dataset.comp)));
    });
    document.querySelectorAll('.quick-synth-chip').forEach(btn => {
      btn.addEventListener('click', () => synthesize(COMPOUNDS.find(c => c.id === btn.dataset.comp)));
    });
    if ($('journalBtn')) $('journalBtn').addEventListener('click', openJournal);
  }

  if (screen === 'result' || screen === 'synthResult') {
    setTimeout(() => { document.querySelectorAll('.result-fill').forEach(el => { el.style.width = el.dataset.target + '%'; }); }, 60);
  }
  if (screen === 'result' && $('resultNextBtn')) {
    $('resultNextBtn').addEventListener('click', () => {
      const m = pendingMajor; pendingMajor = null;
      if (m === 'downfall') goScreen('downfall');
      else if (m === 'career') { careerKey = computeArchetype(id => doneTurn[id] !== undefined && doneTurn[id] <= turnsTaken); goScreen('career'); }
      else if (m === 'retire') goScreen('retire');
      else if (m === 'ending') { legacyKey = computeArchetype(() => true); goScreen('ending'); }
      else goScreen('choose');
    });
  }
  if (screen === 'synthResult' && $('synthNextBtn')) $('synthNextBtn').addEventListener('click', () => goScreen('choose'));

  if (screen === 'career' && $('careerNextBtn')) $('careerNextBtn').addEventListener('click', () => goScreen('choose'));
  if (screen === 'retire' && $('retireNextBtn')) $('retireNextBtn').addEventListener('click', () => goScreen('choose'));
  if (screen === 'ending' && $('endingRestartBtn')) $('endingRestartBtn').addEventListener('click', () => { freshState(); goScreen('title'); });
  if (screen === 'downfall' && $('downfallRestartBtn')) $('downfallRestartBtn').addEventListener('click', () => { freshState(); goScreen('title'); });
}

document.getElementById('journalCloseBtn').addEventListener('click', () => {
  document.getElementById('journalOverlay').classList.remove('show');
});

/* ================= Init ================= */
freshState();
render();
</script>
</body>
</html>
